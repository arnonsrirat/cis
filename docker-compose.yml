services:
  banpick-rov:
    image: arnonsrirat/banpick-rov:latest
    container_name: banpick-rov
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    volumes:
      - ads_uploads:/app/public/uploads
    networks:
      - network_proxy

networks:
  network_proxy:
    external: true

volumes:
  ads_uploads:
